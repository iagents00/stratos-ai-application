<!doctype html>
<html lang="es" translate="no">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="google" content="notranslate" />
    <meta name="theme-color" content="#030810" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Stratos AI" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="description" content="Stratos AI — Sistema operativo de ventas con IA aplicada a la operación comercial." />

    <!-- ─── Open Graph / Facebook / WhatsApp / iMessage ───
         Cuando alguien comparte stratoscapitalgroup.com (o cualquier ruta
         pública) por WhatsApp/Slack/iMessage/etc, estas metas le dicen al
         servicio qué imagen, título y descripción mostrar en el preview. -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="Stratos AI" />
    <meta property="og:title"       content="Stratos AI — El sistema operativo que escala tu empresa" />
    <meta property="og:description" content="CRM inteligente · Pipeline automático · Agentes IA. Todo en un solo lugar, diseñado para cerrar más." />
    <meta property="og:url"         content="https://stratoscapitalgroup.com" />
    <meta property="og:image"       content="https://stratoscapitalgroup.com/og-stratos.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"    content="Stratos AI — Sistema operativo comercial con CRM y agentes IA" />
    <meta property="og:locale"      content="es_MX" />

    <!-- ─── Twitter / X Card ─── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Stratos AI — El sistema operativo que escala tu empresa" />
    <meta name="twitter:description" content="CRM inteligente · Pipeline automático · Agentes IA. Todo en un solo lugar, diseñado para cerrar más." />
    <meta name="twitter:image"       content="https://stratoscapitalgroup.com/og-stratos.png" />
    <meta name="twitter:image:alt"   content="Stratos AI — Sistema operativo comercial" />

    <!-- Inter — fuente cross-platform que reemplaza SF Pro en Windows/Linux
         para que la tipografía se vea idéntica en Mac/iOS y otros sistemas.
         preconnect acelera la carga; display=swap evita FOIT. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
    <!-- Preconnect a Supabase: el navegador hace DNS lookup + TLS handshake
         apenas carga el HTML, así que cuando el usuario hace click en
         "Iniciar sesión" la conexión ya está caliente. Ahorra 200-500ms
         en cold start, especialmente en redes lejanas (México→us-west-2).
         dns-prefetch como fallback para browsers que no soportan preconnect. -->
    <link rel="preconnect" href="https://glulgyhkrqpykxmujodb.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://glulgyhkrqpykxmujodb.supabase.co" />
    <title>Stratos AI | Sistema Operativo</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
