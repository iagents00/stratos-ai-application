    <!-- Inter — fuente cross-platform que reemplaza SF Pro en Windows/Linux
         para que la tipografía se vea idéntica en Mac/iOS y otros sistemas.
         preconnect acelera la carga; display=swap evita FOIT. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
    <!-- Preconnect a Supabase: el navegador hace DNS lookup + TLS handshake
         apenas carga el HTML, así que cuando el usuario hace click en
         "Iniciar sesión" la conexión ya está caliente. Ahorra 200-500ms
         en cold start, especialmente en redes lejanas (México→us-west-2).
         dns-prefetch como fallback para browsers que no soportan preconnect. -->
    <link rel="preconnect" href="https://glulgyhkrqpykxmujodb.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://glulgyhkrqpykxmujodb.supabase.co" />

    <!-- Tailwind CDN: usado solo por la pagina /diagnostico. Cero impacto en el resto de la app porque ninguna otra pagina usa classes Tailwind. -->
  <script src="https://cdn.tailwindcss.com"></script>

  <body>
    <div id="root"></div>
    <!-- ─── Mitigación de crash en Safari iOS ("Ocurrió un problema varias
         veces") ───
         Corre ANTES de la app. Solo pone atributos en <html> que consume
         mobile-perf.css; NUNCA recarga (no crea loops).
           · data-hidden  → pausa animaciones cuando la pestaña está oculta.
           · data-lowfx   → "modo seguro": si la pestaña se cae y recarga ≥3
                            veces en <12s (firma del crash-loop de iOS),
                            quitamos blur + animaciones para que cargue con
                            memoria mínima. Se auto-desactiva al dejar de
                            recargarse. -->
    <script>
      (function () {
        var el = document.documentElement;

        // Tema en <html> ANTES del primer paint: mobile-perf.css lo necesita
        // para que el fondo forzado del modo seguro respete el tema claro
        // (sin esto, las tarjetas quedaban azul-oscuro con texto oscuro).
        // App.jsx lo mantiene en sync al alternar el tema.
        try { el.setAttribute("data-theme", localStorage.getItem("stratos_crm_theme") || "dark"); } catch (e) {}

        // Pausar animaciones cuando la pestaña no está visible (menos repaint
        // en segundo plano → menos presión de memoria en iOS).
        function syncHidden() {
          if (document.hidden) el.setAttribute("data-hidden", "1");
          else el.removeAttribute("data-hidden");
        }
        document.addEventListener("visibilitychange", syncHidden);
        syncHidden();

        // Detector de crash v2 [guard:BOOT-HEALTH] — dos señales + memoria:
        //  a) Loop rápido: ≥3 recargas en <12s (sessionStorage, misma pestaña).
        //  b) Arranques que no llegan a "sano": si la página muere antes de
        //     vivir 15s, cuenta un intento fallido en localStorage. Con ≥3
        //     seguidos (aunque el usuario recargue A MANO minutos después,
        //     que era el hueco de la v1) → modo seguro.
        //  Cualquiera de las dos deja el modo seguro PEGAJOSO por 48h
        //  (stratos_lowfx_until): el iPhone carga plano-pero-estable aunque
        //  siga recargando. Pasadas 48h sin crashes, vuelve solo al look full.
        try {
          var now = Date.now();
          // Claves _v2 (10-jul): la v1 tenía un FALSO POSITIVO en la APP
          // nativa — cerrar la app antes de los 15s contaba como "crash";
          // abrir/cerrar 3 veces probando una APK clavaba el modo seguro 48h
          // (pasó en BlueStacks). Renombrar las claves libera al instante a
          // los dispositivos atascados por ese bug; los contadores nuevos ya
          // no cuentan cierres normales (ver markHealthy abajo).
          var LOWFX_UNTIL = "stratos_lowfx_until_v2";
          var BOOT_FAILS = "stratos_boot_fails_v2";
          var stick = 0;
          try { stick = +localStorage.getItem(LOWFX_UNTIL) || 0; } catch (e) {}
          var lowfx = stick > now;

          // (a) loop rápido en la misma pestaña
          var KEY = "stratos_reload_ticks";
          var ticks = [];
          try { ticks = JSON.parse(sessionStorage.getItem(KEY) || "[]"); } catch (e) {}
          if (!Array.isArray(ticks)) ticks = [];
          ticks.push(now);
          ticks = ticks.filter(function (t) { return now - t < 12000; });
          try { sessionStorage.setItem(KEY, JSON.stringify(ticks)); } catch (e) {}
          if (ticks.length >= 3) lowfx = true;

          // (b) arranques fallidos consecutivos (sobrevive a recargas manuales)
          var fails = 0;
          try { fails = (+localStorage.getItem(BOOT_FAILS) || 0) + 1; } catch (e) {}
          try { localStorage.setItem(BOOT_FAILS, String(fails)); } catch (e) {}
          if (fails >= 3) lowfx = true;
          // si la página vive 15s, el arranque fue sano → resetear el contador
          function markHealthy() {
            try { localStorage.setItem(BOOT_FAILS, "0"); } catch (e) {}
          }
          setTimeout(markHealthy, 15000);
          // Un cierre NORMAL tampoco es un crash: al cerrar/ocultar la app o
          // la pestaña disparan pagehide/visibilitychange — un crash real
          // NUNCA los dispara. Sin esto, salir de la app antes de los 15s
          // contaba como intento fallido (falso positivo de la APP nativa).
          window.addEventListener("pagehide", markHealthy);
          document.addEventListener("visibilitychange", function () {
            if (document.hidden) markHealthy();
          });

          if (lowfx) {
            el.setAttribute("data-lowfx", "1");
            try { localStorage.setItem(LOWFX_UNTIL, String(now + 48 * 3600 * 1000)); } catch (e) {}
          }
        } catch (e) { /* sin storage → el modo seguro no auto-activa;
                         el apagado de blur de móvil (CSS puro) igual aplica. */ }
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
