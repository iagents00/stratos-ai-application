    <!-- Tailwind CDN: cargado dinámicamente sólo en la landing /diagnostico para no generar warnings ni retrasar la carga en el CRM -->

      if (window.location.pathname.startsWith('/diagnostico')) {
        var s = document.createElement('script');
        s.src = "https://cdn.tailwindcss.com";
        document.head.appendChild(s);

  <body>
    <div id="root"></div>
    <!-- ─── Mitigación de crash en Safari iOS ("Ocurrió un problema varias
         veces") ───
         Corre ANTES de la app. Solo pone atributos en <html> que consume
         mobile-perf.css; NUNCA recarga (no crea loops).
           · data-hidden  → pausa animaciones cuando la pestaña está oculta.
           · data-lowfx   → "modo seguro": si la pestaña se cae y recarga ≥3
                            veces en <12s (firma del crash-loop de iOS),
                            quitamos blur + animaciones para que cargue con
                            memoria mínima. Se auto-desactiva al dejar de
                            recargarse. -->
    <script>
      (function () {
        var el = document.documentElement;

        // Tema en <html> ANTES del primer paint: mobile-perf.css lo necesita
        // para que el fondo forzado del modo seguro respete el tema claro
        // (sin esto, las tarjetas quedaban azul-oscuro con texto oscuro).
        // App.jsx lo mantiene en sync al alternar el tema.
        try { el.setAttribute("data-theme", localStorage.getItem("stratos_crm_theme") || "dark"); } catch (e) {}

        // Pausar animaciones cuando la pestaña no está visible (menos repaint
        // en segundo plano → menos presión de memoria en iOS).
        function syncHidden() {
          if (document.hidden) el.setAttribute("data-hidden", "1");
          else el.removeAttribute("data-hidden");
        }
        document.addEventListener("visibilitychange", syncHidden);
        // Safari (macOS) NO siempre dispara "visibilitychange" al VOLVER a la
        // ventana/pestaña, o restaura de bfcache con "pageshow" sin ese evento →
        // data-hidden="1" queda PEGADO y mobile-perf.css congela las animaciones
        // infinitas (átomo, dot "Live", anillo del "Centro de Inteligencia").
        // En focus/pageshow la página SÍ está visible, así que FORZAMOS quitar el
        // flag SIN confiar en document.hidden (que Safari a veces deja "stale" en
        // true). Solo lo quita, nunca lo pone → seguro. (Chrome no lo necesita.)
        function forceShown() { el.removeAttribute("data-hidden"); }
        window.addEventListener("pageshow", forceShown);
        window.addEventListener("focus", forceShown);
        document.addEventListener("visibilitychange", function () { if (!document.hidden) forceShown(); });
        syncHidden();

        // Detector de crash v2 [guard:BOOT-HEALTH] — dos señales + memoria:
        //  a) Loop rápido: ≥3 recargas en <12s (sessionStorage, misma pestaña).
        //  b) Arranques que no llegan a "sano": si la página muere antes de
        //     vivir 15s, cuenta un intento fallido en localStorage. Con ≥3
        //     seguidos (aunque el usuario recargue A MANO minutos después,
        //     que era el hueco de la v1) → modo seguro.
        //  Cualquiera de las dos deja el modo seguro PEGAJOSO por 48h
        //  (stratos_lowfx_until): el iPhone carga plano-pero-estable aunque
        //  siga recargando. Pasadas 48h sin crashes, vuelve solo al look full.
        try {
          var now = Date.now();
          // Claves _v2 (10-jul): la v1 tenía un FALSO POSITIVO en la APP
          // nativa — cerrar la app antes de los 15s contaba como "crash";
          // abrir/cerrar 3 veces probando una APK clavaba el modo seguro 48h
          // (pasó en BlueStacks). Renombrar las claves libera al instante a
          // los dispositivos atascados por ese bug; los contadores nuevos ya
          // no cuentan cierres normales (ver markHealthy abajo).
          var LOWFX_UNTIL = "stratos_lowfx_until_v2";
          var BOOT_FAILS = "stratos_boot_fails_v2";
          var LOWFX_SCOPE = false;
          try {
            LOWFX_SCOPE =
              window.matchMedia("(pointer: coarse), (max-width: 820px)").matches ||
              /iPhone|iPad|iPod|Android/i.test(navigator.userAgent || "");
          } catch (e) {}
          if (!LOWFX_SCOPE) {
            try { localStorage.removeItem(LOWFX_UNTIL); localStorage.removeItem(BOOT_FAILS); } catch (e) {}
            try { sessionStorage.removeItem("stratos_reload_ticks"); } catch (e) {}
            return;
          }
          var stick = 0;
          try { stick = +localStorage.getItem(LOWFX_UNTIL) || 0; } catch (e) {}
          var lowfx = stick > now;

          // (a) loop rápido en la misma pestaña
          var KEY = "stratos_reload_ticks";
          var ticks = [];
          try { ticks = JSON.parse(sessionStorage.getItem(KEY) || "[]"); } catch (e) {}
          if (!Array.isArray(ticks)) ticks = [];
          ticks.push(now);
          ticks = ticks.filter(function (t) { return now - t < 12000; });
          try { sessionStorage.setItem(KEY, JSON.stringify(ticks)); } catch (e) {}
          if (ticks.length >= 3) lowfx = true;

          // (b) arranques fallidos consecutivos (sobrevive a recargas manuales)
          var fails = 0;
          try { fails = (+localStorage.getItem(BOOT_FAILS) || 0) + 1; } catch (e) {}
          try { localStorage.setItem(BOOT_FAILS, String(fails)); } catch (e) {}
          if (fails >= 3) lowfx = true;
          // si la página vive 15s, el arranque fue sano → resetear el contador
          function markHealthy() {
            try { localStorage.setItem(BOOT_FAILS, "0"); } catch (e) {}
          }
          setTimeout(markHealthy, 15000);
          // Un cierre NORMAL tampoco es un crash: al cerrar/ocultar la app o
          // la pestaña disparan pagehide/visibilitychange — un crash real
          // NUNCA los dispara. Sin esto, salir de la app antes de los 15s
          // contaba como intento fallido (falso positivo de la APP nativa).
          window.addEventListener("pagehide", markHealthy);
          document.addEventListener("visibilitychange", function () {
            if (document.hidden) markHealthy();
          });

          if (lowfx) {
            el.setAttribute("data-lowfx", "1");
            try { localStorage.setItem(LOWFX_UNTIL, String(now + 48 * 3600 * 1000)); } catch (e) {}
          }
        } catch (e) { /* sin storage → el modo seguro no auto-activa;
                         el apagado de blur de móvil (CSS puro) igual aplica. */ }
      })();
    </script>
    <!-- ─── [guard:APP-NO-ZOOM] Fijar la APP como app nativa (sin zoom) SIN tocar la WEB ───
         La app es UN SOLO bundle: la MISMA URL corre como sitio web (navegador) y como
         app instalada (PWA en la pantalla de inicio del iPhone / Capacitor APK). En el
         NAVEGADOR el sitio queda 100% zoomeable/accesible (NO se toca — ya está perfecto).
         En la APP instalada queremos que se sienta nativa: sin pinch-zoom ni doble-tap-zoom,
         todo fijo. Detectamos "standalone" (o Capacitor) y SOLO ahí bloqueamos el zoom.
         Reversible: borrar este bloque. -->
    <script>
      (function () {
        function isInstalledApp() {
          try {
            var mm = window.matchMedia;
            return window.navigator.standalone === true ||
              (mm && (mm('(display-mode: standalone)').matches ||
                      mm('(display-mode: fullscreen)').matches ||
                      mm('(display-mode: minimal-ui)').matches)) ||
              !!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform());
          } catch (e) { return false; }
        }
        var locked = false;
        function lockZoom() {
          if (locked || !isInstalledApp()) return;
          locked = true;
          try {
            // iOS: NO tocar el meta viewport — reescribirlo le hace PERDER el
            // viewport-fit=cover y la PWA queda "letterboxed" (franja negra
            // abajo, la app no usa toda la pantalla). En iOS el pinch se
            // bloquea por eventos (abajo). Solo Android/Capacitor reescribe.
            var isIOS = /iP(hone|ad|od)/.test(navigator.userAgent) ||
              (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
            var vp = document.querySelector('meta[name="viewport"]');
            if (vp && !isIOS) vp.setAttribute('content',
              'width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover');
            // iOS: asegurar viewport-fit=cover SIN reescribir el meta (si algún
            // HTML viejo cacheado no lo trae, se le AÑADE — nunca se reemplaza).
            if (vp && isIOS) {
              var vc = vp.getAttribute('content') || '';
              if (vc.indexOf('viewport-fit') === -1)
                vp.setAttribute('content', vc ? vc + ', viewport-fit=cover' : 'width=device-width, initial-scale=1.0, viewport-fit=cover');
            }
            document.documentElement.setAttribute('data-standalone', '1');
            // HARD-LOCK de app nativa: el DOCUMENTO queda clavado (position:fixed en
            // html/body) → no hay rubber-band ni "franja blanca" abajo: el único scroll
            // es el interno de la app (.stratos-content-area). El fondo respeta el tema
            // por si algún frame expone el html (nunca más blanco).
            var st = document.createElement('style');
            st.textContent =
              'html[data-standalone], html[data-standalone] body {' +
              '  position: fixed; inset: 0; width: 100%; height: 100%;' +
              '  overflow: hidden; overscroll-behavior: none; touch-action: manipulation;' +
              '}' +
              'html[data-standalone] { background: #030810; }' +
              'html[data-standalone][data-theme="light"] { background: #F1F3F6; }';
            document.head.appendChild(st);
            // iOS IGNORA user-scalable=no (accesibilidad) → bloquear el pinch a mano:
            // (a) eventos gesture* propios de Safari, (b) touchmove con e.scale ≠ 1
            // (la señal de pinch real en iOS). Solo en la app instalada.
            var stop = function (e) { e.preventDefault(); };
            document.addEventListener('gesturestart', stop, { passive: false });
            document.addEventListener('gesturechange', stop, { passive: false });
            document.addEventListener('gestureend', stop, { passive: false });
            document.addEventListener('touchmove', function (e) {
              if (e.scale !== undefined && e.scale !== 1) e.preventDefault();
            }, { passive: false });
            // ── [guard:APP-VIEWPORT-PIN] ── En la PWA de iOS, al abrir el TECLADO
            // WebKit desplaza la VENTANA entera para mostrar el input; al cerrarlo,
            // en apps standalone ese corrimiento a veces QUEDA PEGADO
            // (window.scrollY > 0) → TODA la app corrida hacia arriba: franja
            // muerta bajo la barra inferior ("la barra no está pegada abajo") y
            // contenido metido bajo el reloj. El documento acá es fijo (html/body
            // position:fixed, scroll interno), así que la ventana NUNCA debe
            // quedar desplazada: cuando no hay un input enfocado, se re-ancla a
            // (0,0). Mientras se escribe NO se toca (iOS necesita ese pan para
            // mostrar el campo sobre el teclado).
            var typing = function () {
              var ae = document.activeElement;
              return !!(ae && (/^(INPUT|TEXTAREA|SELECT)$/.test(ae.tagName || '') || ae.isContentEditable));
            };
            var resetWin = function () {
              if (typing()) return;
              try {
                if (window.scrollX || window.scrollY) window.scrollTo(0, 0);
                var se = document.scrollingElement || document.documentElement;
                if (se.scrollTop) se.scrollTop = 0;
                if (se.scrollLeft) se.scrollLeft = 0;
              } catch (e) {}
            };
            window.addEventListener('scroll', resetWin, { passive: true });
            window.addEventListener('pageshow', resetWin);
            window.addEventListener('orientationchange', function () { setTimeout(resetWin, 120); });
            document.addEventListener('focusout', function () { setTimeout(resetWin, 60); setTimeout(resetWin, 300); });
            if (window.visualViewport)
              window.visualViewport.addEventListener('resize', function () { setTimeout(resetWin, 60); });
            resetWin();
          } catch (e) {}
        }
        lockZoom();
        // Capacitor puede inyectar su global un instante después → reintentar al cargar.
        window.addEventListener('DOMContentLoaded', lockZoom);
        window.addEventListener('load', lockZoom);
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
